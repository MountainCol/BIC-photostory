name: OIDC-workflow

on: 
  push:
    branches:
      - module-02
    
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.BIC_PHOTOSTORY_OIDC_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build application
        run: npm run build
        
      - name: Sync dist folder to S3
        run: |
          aws s3 sync dist/ s3://bic-photostory/ --delete
          echo "Application deployed to S3 bucket: bic-photostory"

      - name: Get CloudFront Distribution ID
        id: cloudfront
        run: |
          cd terraform
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "Found CloudFront Distribution ID: $DISTRIBUTION_ID"

      - name: Deploy to CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.cloudfront.outputs.distribution_id }} --paths "/*"
          echo "Application deployed to CloudFront distribution: ${{ steps.cloudfront.outputs.distribution_id }}"